{% extends 'base.html' %}
{% block title %}Acceso Sistema Óptica Municipal{% endblock %}

{% block content %}
<div class="w-full max-w-md mx-auto pt-36 pb-12 px-4">
    <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        
        <div class="flex justify-center mb-6">
            <img src="{{ url_for('static', filename='img/Logo_Red_APS_2.png') }}" alt="Logo Red de Atención Primaria" class="h-24 object-contain">
        </div>
        
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Sistema de Óptica Municipal</h1>
            <p class="text-gray-500 text-sm mt-2">Inventario y Ventas de Materiales y Accesorios</p>
        </div>
        
        <h2 class="text-xl font-semibold text-center text-gray-700 mb-8">Iniciar Sesión</h2>
        
        <form action="{{ url_for('auth.login') }}" method="post" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="email" name="email" 
                       class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" 
                       placeholder="nombre@mahosalud.cl" required>
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                <div class="relative mt-1">
                    <input type="password" id="password" name="password" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" 
                           placeholder="••••••••" required>
                    <span id="toggle-password" class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer select-none" title="Mantén presionado para ver">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 hover:text-gray-600 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg id="eye-slash-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 .946-3.11 3.563-5.556 6.848-6.675M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.75 4.75l14.5 14.5" />
                        </svg>
                    </span>
                </div>
            </div>
            
            <div class="text-center pt-2">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition duration-200">
                    Ingresar
                </button>
            </div>
            
            <div class="flex flex-col items-center space-y-3 mt-6 pt-4 border-t border-gray-100">
                <a href="{{ url_for('auth.solicitar_reseteo') }}" class="font-medium text-sm text-blue-600 hover:text-blue-800 hover:underline">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const toggleBtn = document.getElementById('toggle-password');
        const passInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        const eyeSlash = document.getElementById('eye-slash-icon');

        const showPass = (e) => {
            e.preventDefault();
            passInput.type = 'text';
            eyeIcon.classList.add('hidden');
            eyeSlash.classList.remove('hidden');
        };

        const hidePass = (e) => {
            e.preventDefault();
            passInput.type = 'password';
            eyeSlash.classList.add('hidden');
            eyeIcon.classList.remove('hidden');
        };

        // Soporte para Mouse
        toggleBtn.addEventListener('mousedown', showPass);
        toggleBtn.addEventListener('mouseup', hidePass);
        toggleBtn.addEventListener('mouseleave', hidePass);
        // Soporte para Pantallas Táctiles
        toggleBtn.addEventListener('touchstart', showPass);
        toggleBtn.addEventListener('touchend', hidePass);
        toggleBtn.addEventListener('touchcancel', hidePass);
    });
</script>
{% endblock %}
