{% extends "base.html" %}
{% block title %}Ingresar Receta{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto my-12 bg-white p-8 rounded-xl shadow-lg">
    <div class="border-b pb-4 mb-8">
        <h2 class="text-2xl font-bold text-gray-800">Ingresar Receta Oftalmológica</h2>
        <p class="text-gray-500 text-sm mt-1">Paciente: <span class="font-bold text-blue-600">{{ paciente.nombre_completo }}</span> (RUT: {{ paciente.rut }})</p>
    </div>

    <form method="POST" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Fecha de la Receta Física</label>
            <input type="date" name="fecha_receta" value="{{ hoy }}" class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none w-full max-w-xs" required>
        </div>

        <div class="border rounded-lg overflow-hidden">
            <table class="w-full text-left bg-gray-50">
                <thead class="bg-gray-200">
                    <tr>
                        <th class="px-4 py-3 font-bold text-gray-700 w-1/4">OJO</th>
                        <th class="px-4 py-3 font-bold text-gray-700">ESFERA (ESF)</th>
                        <th class="px-4 py-3 font-bold text-gray-700">CILINDRO (CIL)</th>
                        <th class="px-4 py-3 font-bold text-gray-700">EJE (°)</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    <tr class="bg-white">
                        <td class="px-4 py-4 font-bold text-gray-700">DERECHO (OD)</td>
                        <td class="px-4 py-3"><input type="text" name="od_esfera" placeholder="Ej: +1.25" class="w-full p-2 border rounded"></td>
                        <td class="px-4 py-3"><input type="text" name="od_cilindro" placeholder="Ej: -0.50" class="w-full p-2 border rounded"></td>
                        <td class="px-4 py-3"><input type="text" name="od_eje" placeholder="Ej: 180" class="w-full p-2 border rounded"></td>
                    </tr>
                    <tr class="bg-white">
                        <td class="px-4 py-4 font-bold text-gray-700">IZQUIERDO (OI)</td>
                        <td class="px-4 py-3"><input type="text" name="oi_esfera" placeholder="Ej: Plano" class="w-full p-2 border rounded"></td>
                        <td class="px-4 py-3"><input type="text" name="oi_cilindro" placeholder="Ej: -0.75" class="w-full p-2 border rounded"></td>
                        <td class="px-4 py-3"><input type="text" name="oi_eje" placeholder="Ej: 90" class="w-full p-2 border rounded"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-blue-50/50 p-6 rounded-lg border">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Distancia Pupilar (DP)</label>
                <input type="text" name="distancia_pupilar" placeholder="Ej: 62mm" class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Adición (ADD)</label>
                <input type="text" name="adicion" placeholder="Ej: +2.00 (Si aplica)" class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">Observaciones / Tipo de Cristal Recomendado</label>
                <textarea name="observaciones" rows="2" class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500" placeholder="Ej: Bifocal Flat Top, antireflejo..."></textarea>
            </div>
        </div>

        <div class="flex justify-end gap-4 pt-6 border-t border-gray-100">
            <a href="{{ url_for('clinica.ficha_paciente', id=paciente.id) }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary bg-green-600 hover:bg-green-700 border-green-600">Guardar Receta Clínica</button>
        </div>
    </form>
</div>
{% endblock %}
