{% extends "base.html" %}
{% block title %}Subir Receta Digitalizada{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto my-12 bg-white p-8 rounded-xl shadow-lg space-y-8">
    <div class="border-b pb-4">
        <h2 class="text-2xl font-bold text-gray-800">Cargar Receta Digitalizada</h2>
        <p class="text-gray-500 text-sm mt-1">Paciente: <span class="font-bold text-blue-600">{{ paciente.nombre_completo }}</span> (RUT: {{ paciente.rut }})</p>
    </div>

    <!-- IMPORTANTÍSIMO: enctype="multipart/form-data" para permitir subida de archivos -->
    <form method="POST" enctype="multipart/form-data" class="space-y-8">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <div class="bg-blue-50 p-6 rounded-xl border border-blue-100">
            <label class="block text-sm font-bold text-blue-900 mb-2">Archivo de la Receta</label>
            <input type="file" name="archivo_receta" accept=".pdf,.jpg,.jpeg,.png" class="w-full px-4 py-3 bg-white border border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer" required>
            <p class="text-xs text-blue-600 mt-2">Formatos permitidos: PDF, JPG, PNG.</p>
        </div>

        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Observaciones (Opcional)</label>
            <textarea name="observaciones" rows="3" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white" placeholder="Ej: Receta visada por Dr. Juan Pérez..."></textarea>
        </div>

        <div class="flex justify-end gap-4 pt-6 border-t border-gray-100">
            <a href="{{ url_for('clinica.ficha_paciente', id=paciente.id) }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary bg-green-600 hover:bg-green-700 border-green-600 shadow-md">Subir y Guardar</button>
        </div>
    </form>
</div>
{% endblock %}
