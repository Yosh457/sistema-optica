{% extends "base.html" %}
{% block title %}Registrar Paciente{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto my-12 bg-white p-8 rounded-xl shadow-lg">
    <div class="border-b pb-4 mb-8">
        <h2 class="text-2xl font-bold text-gray-800">Registrar Nuevo Paciente</h2>
    </div>
    <form method="POST" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">RUT</label>
                <input type="text" name="rut" value="{{ datos_previos.rut if datos_previos else '' }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none uppercase font-mono" placeholder="Ej: 12345678-9" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Teléfono</label>
                <input type="text" name="telefono" value="{{ datos_previos.telefono if datos_previos else '' }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Opcional">
            </div>
        </div>
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Nombre Completo</label>
            <input type="text" name="nombre_completo" value="{{ datos_previos.nombre_completo if datos_previos else '' }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
        </div>
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Dirección</label>
            <input type="text" name="direccion" value="{{ datos_previos.direccion if datos_previos else '' }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Opcional">
        </div>
        <div class="flex justify-end gap-4 pt-6 border-t">
            <a href="{{ url_for('clinica.listar_pacientes') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Registrar</button>
        </div>
    </form>
</div>
{% endblock %}
