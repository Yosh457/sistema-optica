{% extends "base.html" %}
{% block title %}Editar Paciente{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto my-12 bg-white p-8 rounded-xl shadow-lg">
    <div class="border-b pb-4 mb-8">
        <h2 class="text-2xl font-bold text-gray-800">Modificar Paciente</h2>
        <p class="text-gray-500 text-sm mt-1">Ficha: {{ paciente.nombre_completo }}</p>
    </div>
    <form id="edit-user-form" method="POST" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">RUT</label>
                <input type="text" name="rut" value="{{ paciente.rut }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-mono" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Teléfono</label>
                <input type="text" name="telefono" value="{{ paciente.telefono }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
        </div>
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Nombre Completo</label>
            <input type="text" name="nombre_completo" value="{{ paciente.nombre_completo }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Recinto Inscrito</label>
                <select name="establecimiento_id" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white" required>
                    <option value="" disabled>-- Seleccione CESFAM/CECOSF --</option>
                    {% for est in establecimientos %}
                        <option value="{{ est.id }}" {% if paciente.establecimiento_id == est.id %}selected{% endif %}>{{ est.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Dirección</label>
                <input type="text" name="direccion" value="{{ paciente.direccion }}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
        </div>
        <div class="flex justify-end gap-4 pt-6 border-t mt-8">
            <a href="{{ url_for('clinica.ficha_paciente', id=paciente.id) }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        </div>
    </form>
</div>
<div id="confirmation-modal" class="fixed inset-0 z-50 items-center justify-center hidden bg-black bg-opacity-50 flex">
    <div class="bg-white rounded-xl shadow-2xl p-6 m-4 text-center max-w-sm w-full">
        <h3 class="font-bold text-lg mb-2">Confirmar Modificación</h3>
        <p class="text-sm text-gray-600 mb-4">¿Guardar los cambios del paciente?</p>
        <div class="flex justify-center gap-2">
            <button id="cancel-save" class="btn btn-secondary">Cancelar</button>
            <button id="confirm-save" class="btn btn-primary">Guardar</button>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/modal_handler.js') }}"></script>
{% endblock %}
