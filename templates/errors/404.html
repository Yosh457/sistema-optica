{% extends "base.html" %}

{% block title %}Página no encontrada{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center text-center px-4">
    <div class="bg-blue-50 p-6 rounded-full mb-6">
        <svg class="w-16 h-16 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
    </div>
    <h1 class="text-4xl font-bold text-gray-900 mb-2">404</h1>
    <h2 class="text-xl font-semibold text-gray-700 mb-4">Página no encontrada</h2>
    <p class="text-gray-500 max-w-md mb-8">
        Lo sentimos, no pudimos encontrar la página que estás buscando. Es posible que haya sido movida o eliminada.
    </p>
    <a href="{{ url_for('auth.login') }}" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-blue-700 transition shadow-sm">
        Volver al Inicio
    </a>
</div>
{% endblock %}
